      function makeConfettiPiece(left, delay, duration, color, rotate) {
        const piece = document.createElement("div");

        piece.style.top = "-20px";

        piece.style.width = "10px";
        piece.style.height = "14px";
        piece.style.background = color;

<script>
function copyCode(id){
  const el = document.getElementById(id);
  el.select();
  document.execCommand("copy");
  alert("Copied!");
}

function downloadCode(id, filename){
  const content = document.getElementById(id).value;
  const blob = new Blob([content], {type:"text/html"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

/* preview confetti */
document.getElementById("previewConfetti").onclick = function(){

    d.style.transition="top 1.5s linear";
    area.appendChild(d);
    setTimeout(()=>{ d.style.top="150px"; },10);

};
