<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Weighted Grade Calculator</title>
  <link rel="stylesheet" href="https://s.brightspace.com/lib/fonts/0.6.1/fonts.css">
</head>

<body style="font-family:Lato,Arial,sans-serif;background:#f7f7f7;margin:0;padding:24px;color:#313131;">

<main style="max-width:950px;margin:0 auto;">

  <section style="border:1px solid #ddd;border-radius:16px;padding:18px;background:#fff;">
    <h1 style="margin-top:0;color:#ae3f00;">Weighted Grade Calculator</h1>
    <p>Preview the calculator below, then copy or download the Brightspace-ready HTML.</p>

    <h2>Preview</h2>

    <!-- PREVIEW AREA -->
    <div style="border:1px solid #e6e6e6;border-radius:16px;padding:18px;background:#fafafa;">

      <!-- 
        PASTE ONLY THE INNER CALCULATOR HERE:
        Start from:
        <section aria-label="Weighted Grade Calculator">
        ...
        </section>
        <script>...</script>

        Do NOT paste <!DOCTYPE html>, <html>, <head>, or <body> here.
      -->

    </div>

    <div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap;">
      <button onclick="copyCode('weightedCode')" type="button"
        style="cursor:pointer;border:1px solid #cb4900;background:#cb4900;color:#fff;padding:10px 14px;border-radius:12px;font-weight:bold;">
        Copy HTML
      </button>

      <button onclick="downloadCode('weightedCode','weighted-grade-calculator.html')" type="button"
        style="cursor:pointer;border:1px solid #4c4a4f;background:#4c4a4f;color:#fff;padding:10px 14px;border-radius:12px;font-weight:bold;">
        Download HTML
      </button>
    </div>

    <h2>Copy HTML</h2>

    <textarea id="weightedCode" readonly
      style="width:100%;height:360px;padding:12px;border:1px solid #ddd;border-radius:12px;font-family:monospace;box-sizing:border-box;">
<!-- 
PASTE THE FULL BRIGHTSPACE CALCULATOR HERE:
You CAN include <!DOCTYPE html>, <html>, <head>, and <body> in this textarea.
-->
    </textarea>

    <p><a href="../index.html">← Back to catalog</a></p>
  </section>

</main>

<script>
  function copyCode(id) {
    const el = document.getElementById(id);
    el.select();
    el.setSelectionRange(0, 999999);
    document.execCommand("copy");
    alert("Copied!");
  }

  function downloadCode(id, filename) {
    const content = document.getElementById(id).value;
    const blob = new Blob([content], {type:"text/html"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
  }
</script>

</body>
</html>
