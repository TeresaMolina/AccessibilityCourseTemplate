<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Weighted Grade Calculator</title>

  <link rel="stylesheet"
    href="https://s.brightspace.com/lib/fonts/0.6.1/fonts.css">
</head>

<body style="font-family:Lato,Arial,sans-serif;
             background:#f7f7f7;
             margin:0;
             padding:24px;
             color:#313131;">

<main style="max-width:1000px;margin:0 auto;">

  <!-- MAIN CARD -->
  <section style="border:1px solid #ddd;
                  border-radius:18px;
                  background:#fff;
                  padding:20px;">

    <h1 style="margin-top:0;color:#ae3f00;">
      Weighted Grade Calculator
    </h1>

    <p>
      Preview the calculator below. You may copy or download
      the Brightspace-ready HTML.
    </p>

    <!-- ================================= -->
    <!-- PREVIEW -->
    <!-- ================================= -->

    <h2>Preview</h2>

    <div style="border:1px solid #e6e6e6;
                border-radius:16px;
                padding:18px;
                background:#fafafa;">

      <!-- PASTE LIVE CALCULATOR HERE -->
      <!-- REAL WORKING WIDGET -->
    </div>

    <!-- ================================= -->
    <!-- ACTION BUTTONS -->
    <!-- ================================= -->

    <div style="margin-top:18px;
                display:flex;
                gap:10px;
                flex-wrap:wrap;">

      <button onclick="copyCode()"
        type="button"
        style="cursor:pointer;
               border:1px solid #cb4900;
               background:#cb4900;
               color:#fff;
               padding:10px 14px;
               border-radius:12px;
               font-weight:bold;">

        Copy HTML
      </button>

      <button onclick="downloadCode()"
        type="button"
        style="cursor:pointer;
               border:1px solid #4c4a4f;
               background:#4c4a4f;
               color:#fff;
               padding:10px 14px;
               border-radius:12px;
               font-weight:bold;">

        Download HTML
      </button>

    </div>

    <!-- ================================= -->
    <!-- HIDDEN TEXTAREA -->
    <!-- ================================= -->

    <textarea id="widgetCode"
      readonly
      style="position:absolute;
             left:-9999px;
             width:1px;
             height:1px;
             opacity:0;">

<!-- FULL BRIGHTSPACE HTML HERE -->
<!-- escaped with &lt; and &gt; -->

    </textarea>

  </section>

</main>

<script>
function copyCode() {
  const el = document.getElementById("widgetCode");

  el.style.display = "block";
  el.select();
  document.execCommand("copy");
  el.style.display = "none";

  alert("HTML copied!");
}

function downloadCode() {
  const content =
    document.getElementById("widgetCode").value;

  const blob = new Blob(
    [content],
    { type: "text/html" }
  );

  const a = document.createElement("a");

  a.href = URL.createObjectURL(blob);
  a.download = "weighted-grade-calculator.html";

  a.click();
}
</script>

</body>
</html>
